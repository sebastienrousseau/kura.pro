name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'functions/**'
      - 'vitest.config.js'
  pull_request:
    paths:
      - 'scripts/**'
      - 'functions/**'
      - 'vitest.config.js'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install root dependencies
        run: npm ci

      - name: Install script dependencies
        run: npm ci
        working-directory: scripts

      - name: Run tests
        run: npm test
