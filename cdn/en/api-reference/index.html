<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudCDN — API Reference</title>
  <meta name="description" content="Interactive API reference for CloudCDN. Storage, Core, Assets, Insights, Delivery, and AI endpoints with Try It console and client libraries.">
  <link rel="icon" href="/favicon.ico">

  <!-- Preload spec for instant render -->
  <link rel="preload" href="openapi.json" as="fetch" crossorigin="anonymous">

  <style>
    body { margin: 0; }

    .api-topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: #0f1117;
      border-bottom: 1px solid #2a2d3a;
      padding: 0.5rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .api-topbar a { color: #5b5f73; text-decoration: none; transition: color 0.15s; }
    .api-topbar a:hover { color: #fff; }
    .api-topbar h1 { font-size: 0.9375rem; font-weight: 700; color: #fff; margin: 0; }
    .api-topbar h1 span { color: #6366f1; }
    .api-topbar .spacer { flex: 1; }
    .api-topbar .pill {
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 0.375rem;
      padding: 0.1875rem 0.625rem;
      color: #a5b4fc;
      font-size: 0.6875rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .api-topbar .pill:hover { background: rgba(99,102,241,0.2); color: #fff; }

    .scalar-wrapper { padding-top: 42px; }
  </style>
</head>
<body>
  <div class="api-topbar">
    <a href="/" title="Home">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <h1>Cloud<span>CDN</span> API</h1>
    <span class="spacer"></span>
    <a href="clients/javascript.js" class="pill" download>JS Client</a>
    <a href="clients/typescript.ts" class="pill" download>TS Client</a>
    <a href="clients/python.py" class="pill" download>Python</a>
    <a href="clients/curl.sh" class="pill" download>cURL</a>
    <a href="openapi.json" class="pill" download="cloudcdn-openapi.json">OpenAPI Spec</a>
    <a href="/dashboard" style="font-size:0.6875rem;">Dashboard</a>
  </div>

  <div class="scalar-wrapper">
    <script
      id="api-reference"
      data-url="openapi.json"
      data-configuration='{
        "theme": "saturn",
        "darkMode": true,
        "layout": "modern",
        "hideDownloadButton": false,
        "searchHotKey": "k",
        "showSidebar": true,
        "defaultHttpClient": {
          "targetKey": "javascript",
          "clientKey": "fetch"
        },
        "hiddenClients": [],
        "servers": [
          { "url": "https://cloudcdn.pro", "description": "Production" },
          { "url": "http://localhost:8788", "description": "Local Dev" }
        ],
        "authentication": {
          "preferredSecurityScheme": "AccessKey",
          "apiKey": {
            "token": ""
          }
        },
        "metaData": {
          "title": "CloudCDN API Reference",
          "description": "Interactive API documentation for CloudCDN — Storage, Core, Assets, Insights, Delivery, and AI.",
          "ogDescription": "Enterprise CDN API with Try It console, client libraries, and OpenAPI 3.1 spec.",
          "ogTitle": "CloudCDN API Reference"
        }
      }'>
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  </div>
</body>
</html>
