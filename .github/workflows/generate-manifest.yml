name: Generate Asset Manifest
on:
  push:
    branches: [main]
    paths:
      - '**/images/**'
      - '**/*.png'
      - '**/*.webp'
      - '**/*.avif'
      - '**/*.svg'
      - '**/*.ico'
  workflow_run:
    workflows: ["Compress Images"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Manifest
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const SKIP = new Set(['.git', '.github', 'dashboard', 'scripts', 'node_modules']);
          const EXTS = new Set(['.png', '.webp', '.avif', '.svg', '.ico']);

          const getFiles = (dir) => {
            let results = [];
            let list;
            try { list = fs.readdirSync(dir); } catch { return results; }
            for (const file of list) {
              const full = path.join(dir, file);
              try {
                const stat = fs.statSync(full);
                if (stat.isDirectory()) {
                  if (SKIP.has(file)) continue;
                  results = results.concat(getFiles(full));
                } else {
                  const ext = path.extname(file).toLowerCase();
                  if (!EXTS.has(ext)) continue;
                  const rel = path.relative(process.cwd(), full);
                  const parts = rel.split('/');
                  results.push({
                    name: path.basename(file),
                    path: rel,
                    project: parts[0] || 'root',
                    category: parts.length >= 3 ? parts[2] : 'general',
                    format: ext.slice(1),
                    size: stat.size
                  });
                }
              } catch {}
            }
            return results;
          };

          const manifest = getFiles('.');
          manifest.sort((a, b) => a.path.localeCompare(b.path));
          fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2));
          console.log('Manifest generated:', manifest.length, 'assets');
          "

      - name: Commit manifest via API (signed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git add manifest.json
          if git diff --cached --quiet; then
            echo "No changes to manifest"
            exit 0
          fi

          REPO="${{ github.repository }}"
          BRANCH="main"
          HEAD_SHA=$(gh api "repos/$REPO/git/ref/heads/$BRANCH" --jq '.object.sha')
          BASE_TREE=$(gh api "repos/$REPO/git/commits/$HEAD_SHA" --jq '.tree.sha')

          # Create blob for manifest.json
          BLOB_SHA=$(gh api "repos/$REPO/git/blobs" \
            -f encoding=base64 \
            -f content="$(base64 < manifest.json)" \
            --jq '.sha')

          # Create tree with updated manifest
          TREE_SHA=$(jq -n \
            --arg base "$BASE_TREE" \
            --arg sha "$BLOB_SHA" \
            '{"base_tree": $base, "tree": [{"path": "manifest.json", "mode": "100644", "type": "blob", "sha": $sha}]}' \
            | gh api "repos/$REPO/git/trees" --input - --jq '.sha')

          # Create commit (automatically signed by GitHub)
          COMMIT_SHA=$(jq -n \
            --arg msg "chore: auto-update manifest.json [skip ci]" \
            --argjson parents "[\"$HEAD_SHA\"]" \
            --arg tree "$TREE_SHA" \
            '{"message": $msg, "parents": $parents, "tree": $tree}' \
            | gh api "repos/$REPO/git/commits" --input - --jq '.sha')

          # Update branch ref
          gh api "repos/$REPO/git/refs/heads/$BRANCH" \
            -X PATCH -f sha="$COMMIT_SHA" --silent

          echo "Committed $COMMIT_SHA (signed by GitHub)"
