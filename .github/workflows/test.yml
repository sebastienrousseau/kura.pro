name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'functions/**'
      - 'vitest.config.js'
      - 'dashboard/**'
      - 'package.json'
  pull_request:
    paths:
      - 'scripts/**'
      - 'functions/**'
      - 'vitest.config.js'
      - 'dashboard/**'
      - 'package.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Node.js CI via reusable pipelines — SHA-pinned actions, caching, coverage
  ci:
    uses: sebastienrousseau/pipelines/.github/workflows/node-ci.yml@main
    with:
      node-version: '20'
      package-manager: 'npm'
      run-lint: false
      run-typecheck: false
      run-build: false
      test-coverage: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Security scanning via reusable pipelines — npm audit, CodeQL, dependency review
  security:
    uses: sebastienrousseau/pipelines/.github/workflows/security.yml@main
    with:
      language: node
      severity-threshold: high
      fail-on-vulnerability: false
    permissions:
      security-events: write
      contents: read

  # Visual regression — Playwright (project-specific, not in pipelines)
  visual-regression:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start local server
        run: python3 -m http.server 8788 &

      - name: Wait for server
        run: sleep 2 && curl -sf http://localhost:8788/ > /dev/null

      - name: Run visual regression tests
        run: npx playwright test scripts/tests/visual/
        continue-on-error: true

      - name: Upload visual diff artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: visual-regression-report
          path: test-results/
          retention-days: 3
