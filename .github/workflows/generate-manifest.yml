name: Generate Asset Manifest
on:
  push:
    branches: [main]
    paths:
      - '**/images/**'
      - '**/*.png'
      - '**/*.webp'
      - '**/*.avif'
      - '**/*.svg'
      - '**/*.ico'
  workflow_run:
    workflows: ["Compress Images"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Manifest
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const SKIP = new Set(['.git', '.github', 'dashboard', 'scripts', 'node_modules']);
          const EXTS = new Set(['.png', '.webp', '.avif', '.svg', '.ico']);

          const getFiles = (dir) => {
            let results = [];
            let list;
            try { list = fs.readdirSync(dir); } catch { return results; }
            for (const file of list) {
              const full = path.join(dir, file);
              try {
                const stat = fs.statSync(full);
                if (stat.isDirectory()) {
                  if (SKIP.has(file)) continue;
                  results = results.concat(getFiles(full));
                } else {
                  const ext = path.extname(file).toLowerCase();
                  if (!EXTS.has(ext)) continue;
                  const rel = path.relative(process.cwd(), full);
                  const parts = rel.split('/');
                  results.push({
                    name: path.basename(file),
                    path: rel,
                    project: parts[0] || 'root',
                    category: parts.length >= 3 ? parts[2] : 'general',
                    format: ext.slice(1),
                    size: stat.size
                  });
                }
              } catch {}
            }
            return results;
          };

          const manifest = getFiles('.');
          manifest.sort((a, b) => a.path.localeCompare(b.path));
          fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2));
          console.log('Manifest generated:', manifest.length, 'assets');
          "

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet && echo "No changes to manifest" || (git commit -m "chore: auto-update manifest.json [skip ci]" && git push)
