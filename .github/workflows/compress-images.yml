name: Compress Images
on:
  push:
    branches: [main]
    paths:
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
  workflow_dispatch:

jobs:
  compress:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'

      - name: Install sharp
        run: npm install sharp

      - name: Find and convert new images
        run: |
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const diff = execSync('git diff --name-only --diff-filter=A HEAD~1 HEAD').toString().trim();
          if (!diff) { console.log('No new files'); process.exit(0); }

          const files = diff.split('\n').filter(f =>
            /\.(png|jpe?g)$/i.test(f) && fs.existsSync(f)
          );

          if (files.length === 0) { console.log('No new images to convert'); process.exit(0); }

          (async () => {
            for (const file of files) {
              const base = file.replace(/\.(png|jpe?g)$/i, '');
              const webpOut = base + '.webp';
              const avifOut = base + '.avif';

              try {
                if (!fs.existsSync(webpOut)) {
                  await sharp(file).webp({ quality: 80 }).toFile(webpOut);
                  console.log('WebP:', webpOut);
                }
                if (!fs.existsSync(avifOut)) {
                  await sharp(file).avif({ quality: 65 }).toFile(avifOut);
                  console.log('AVIF:', avifOut);
                }
              } catch (err) {
                console.error('Error converting', file, err.message);
              }
            }
          })();
          "

      - name: Commit converted images via API (signed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Stage new files and check for changes
          git add -A '*.webp' '*.avif'
          if git diff --cached --quiet; then
            echo "No new conversions"
            exit 0
          fi

          # Get current HEAD info
          REPO="${{ github.repository }}"
          BRANCH="main"
          HEAD_SHA=$(gh api "repos/$REPO/git/ref/heads/$BRANCH" --jq '.object.sha')
          BASE_TREE=$(gh api "repos/$REPO/git/commits/$HEAD_SHA" --jq '.tree.sha')

          # Build tree entries from staged files
          TREE_ENTRIES="[]"
          for FILE in $(git diff --cached --name-only); do
            PAYLOAD=$(mktemp)
            printf '{"encoding":"base64","content":"' > "$PAYLOAD"
            base64 < "$FILE" | tr -d '\n' >> "$PAYLOAD"
            printf '"}' >> "$PAYLOAD"
            BLOB_SHA=$(gh api "repos/$REPO/git/blobs" --input "$PAYLOAD" --jq '.sha')
            rm -f "$PAYLOAD"
            TREE_ENTRIES=$(echo "$TREE_ENTRIES" | jq \
              --arg path "$FILE" \
              --arg sha "$BLOB_SHA" \
              '. + [{"path": $path, "mode": "100644", "type": "blob", "sha": $sha}]')
          done

          # Create tree
          TREE_SHA=$(echo "$TREE_ENTRIES" | jq -n \
            --arg base "$BASE_TREE" \
            --argjson tree "$(cat)" \
            '{"base_tree": $base, "tree": $tree}' \
            | gh api "repos/$REPO/git/trees" --input - --jq '.sha')

          # Create commit (automatically signed by GitHub)
          COMMIT_SHA=$(jq -n \
            --arg msg "chore: auto-convert images to WebP/AVIF [skip ci]" \
            --argjson parents "[\"$HEAD_SHA\"]" \
            --arg tree "$TREE_SHA" \
            '{"message": $msg, "parents": $parents, "tree": $tree}' \
            | gh api "repos/$REPO/git/commits" --input - --jq '.sha')

          # Update branch ref
          gh api "repos/$REPO/git/refs/heads/$BRANCH" \
            -X PATCH -f sha="$COMMIT_SHA" --silent

          echo "Committed $COMMIT_SHA (signed by GitHub)"
