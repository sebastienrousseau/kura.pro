name: Generate Asset Manifest
on:
  push:
    branches: [main]
    paths:
      - '**/images/**'
      - '**/*.png'
      - '**/*.webp'
      - '**/*.avif'
      - '**/*.svg'
      - '**/*.ico'
  workflow_run:
    workflows: ["Compress Images"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build Manifest
        run: node website/scripts/generate-manifest.mjs

      - name: Commit manifest via API (signed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git add manifest.json
          if git diff --cached --quiet; then
            echo "No changes to manifest"
            exit 0
          fi

          REPO="${{ github.repository }}"
          BRANCH="main"
          HEAD_SHA=$(gh api "repos/$REPO/git/ref/heads/$BRANCH" --jq '.object.sha')
          BASE_TREE=$(gh api "repos/$REPO/git/commits/$HEAD_SHA" --jq '.tree.sha')

          # Create blob via stdin (avoids argument-list-too-long for large manifests)
          BLOB_SHA=$(jq -n --arg content "$(base64 < manifest.json)" \
            '{"encoding": "base64", "content": $content}' \
            | gh api "repos/$REPO/git/blobs" --input - --jq '.sha')

          # Create tree
          TREE_SHA=$(jq -n \
            --arg base "$BASE_TREE" \
            --arg sha "$BLOB_SHA" \
            '{"base_tree": $base, "tree": [{"path": "manifest.json", "mode": "100644", "type": "blob", "sha": $sha}]}' \
            | gh api "repos/$REPO/git/trees" --input - --jq '.sha')

          # Create commit (automatically signed by GitHub)
          COMMIT_SHA=$(jq -n \
            --arg msg "chore: auto-update manifest.json [skip ci]" \
            --argjson parents "[\"$HEAD_SHA\"]" \
            --arg tree "$TREE_SHA" \
            '{"message": $msg, "parents": $parents, "tree": $tree}' \
            | gh api "repos/$REPO/git/commits" --input - --jq '.sha')

          # Update branch ref
          gh api "repos/$REPO/git/refs/heads/$BRANCH" \
            -X PATCH -f sha="$COMMIT_SHA" --silent

          echo "Committed $COMMIT_SHA (signed by GitHub)"
